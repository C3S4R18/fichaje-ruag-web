name: Renovar Vacaciones Automaticamente

on:
  schedule:
    - cron: '10 5 * * *'
  workflow_dispatch:

jobs:
  renovar-vacaciones:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar endpoint de vencimiento de vacaciones
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/cron/vacaciones-vencimiento")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "El endpoint devolvio un error"
            exit 1
          fi

          echo "Renovacion de vacaciones procesada correctamente"
