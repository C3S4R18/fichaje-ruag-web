name: Crear Periodo Anual de Vacaciones

on:
  schedule:
    - cron: '50 4 * * *'
  workflow_dispatch:

jobs:
  crear-periodo:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar endpoint de cambio de periodo
        run: |
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.APP_URL }}/api/cron/vacaciones-periodo")

          echo "HTTP Status: $RESPONSE"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$RESPONSE" != "200" ]; then
            echo "El endpoint devolvio un error"
            exit 1
          fi

          echo "Cambio de periodo procesado correctamente"
